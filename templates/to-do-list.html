<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css-FirstPage.css') }}">
  <title>To-Do</title>
</head>

<body>
  <div class="container">
    <nav>
      <a href="/to-do-list" class="active">Tasks</a>
      <a href="/account">Account</a>
      <a href="/settings">Settings</a>
      <a href="/logout">Logout</a>
    </nav>

    <h1>To<span>-</span>Do</h1>
    <p class="subtitle">Click a task to mark it complete</p>

    <button onclick="addTask()">Add new Task</button>
    <button onclick="editTask()">Edit Task</button>
    <button onclick="deleteTask()">Delete Task</button>

    <form method="POST" id="taskForm">
      Task name: <input type="text" name="taskName">
      <br>
      <label>Deadline:</label>
      <input type="date" name="taskDate" id="id_date">
      <br>
      <label>Choose a Status:</label>
    </form>

    <button onclick="getNormal('normal')">normal</button>
    <button onclick="getImportant('important')">important</button>
    <button onclick="getUrgent('urgent')">urgent</button>

    <form method="POST" id="statusNormalForm">
      <input type="hidden" name="statusNormal" id="id_normal">
    </form>

    <form method="POST" id="statusImportantForm">
      <input type="hidden" name="statusImportant" id="id_important">
    </form>

    <form method="POST" id="statusUrgentForm">
      <input type="hidden" name="statusUrgent" id="id_urgent">
    </form>

    <button onclick="saveTask()">Add Task</button>

    <p class="section-label">Today</p>
    <ul class="todo-list">
      <li class="todo-item">
        <input type="checkbox" id="item1">
        <label for="item1">Review project proposal
          <span class="badge urgent">urgent</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item2">
        <label for="item2">Reply to pending emails <span class="badge">normal</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item3">
        <label for="item3">Buy groceries <span class="badge">normal</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item4">
        <label for="item4">Morning run <span class="badge">normal</span></label>
      </li>
    </ul>

    <p class="section-label">This week</p>
    <ul class="todo-list">
      <li class="todo-item">
        <input type="checkbox" id="item5">
        <label for="item5">Finish reading chapter 4 <span class="badge">normal</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item6">
        <label for="item6">Schedule dentist appointment
          <span class="badge urgent">urgent</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item7">
        <label for="item7">Clean the apartment <span class="badge">normal</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item8">
        <label for="item8">Pay electricity bill <span class="badge">normal</span></label>
      </li>
    </ul>
  </div>
  <script>
    function addTask() {}

    function editTask() {}

    function deleteTask() {}

    function getNormal(status) {
      document.getElementById("id_normal").value = status;
      document.getElementById("id_important").value = '';
      document.getElementById("id_urgent").value = '';
    }

    function getImportant(status) {
      document.getElementById("id_normal").value = '';
      document.getElementById("id_important").value = status;
      document.getElementById("id_urgent").value = '';
    }

    function getUrgent(status) {
      document.getElementById("id_normal").value = '';
      document.getElementById("id_important").value = status;
      document.getElementById("id_urgent").value = '';
    }

    function saveTask() {
      let getNormal = document.getElementById("id_normal").value;
      let getImportant = document.getElementById("id_important").value;
      let getUrgent = document.getElementById("id_urgent").value;

      document.getElementById("taskForm").submit();

      if (getNormal != '') {
        document.getElementById("statusNormalForm").submit();
      }

      if (getImportant != '') {
        document.getElementById("statusImportantForm").submit();
      }

      if (getUrgent != '') {
        document.getElementById("statusUrgentForm").submit();
      }
    }
  </script>
</body>

</html>
