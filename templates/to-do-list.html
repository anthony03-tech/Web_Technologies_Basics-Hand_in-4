<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css-FirstPage.css') }}">
  <title>To-Do</title>
</head>

<body>
  <div class="container">
    <nav>
      <a href="/to-do-list" class="active">Tasks</a>
      <a href="/account">Account</a>
      <a href="/settings">Settings</a>
      <a href="/logout">Logout</a>
    </nav>

    <h1>To<span>-</span>Do</h1>
    <p class="subtitle">Click a task to mark it complete</p>

    <button onclick="addTask()">Add new Task</button>
    <button onclick="editTask()">Edit Task</button>
    <button onclick="deleteTask()">Delete Task</button>

    <form action="#" method="POST">
      Task name: <input type="text" name="taskName">
      <br>
      <label>Deadline:</label>
      <input type="date" name="taskDate" id="id_date">
      <br>
      <label>Choose a Type:</label>
    </form>

    <button onclick="getNormal('normal')">normal</button>
    <button onclick="getImportant('important')">important</button>
    <button onclick="getUrgent('urgent')">urgent</button>

    <form action="#" method="POST">
      <input type="hidden" name="typeNormal" id="id_normal">
    </form>

    <form action="#" method="POST">
      <input type="hidden" name="typeImportant" id="id_important">
    </form>

    <form action="#" method="POST">
      <input type="hidden" name="typeUrgent" id="id_urgent">
    </form>

    <button onclick="saveTask()">Add Task</button>

    <p class="section-label">Today</p>
    <ul class="todo-list">
      <li class="todo-item">
        <input type="checkbox" id="item1">
        <label for="item1">Review project proposal
          <span class="badge urgent">urgent</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item2">
        <label for="item2">Reply to pending emails <span class="badge">normal</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item3">
        <label for="item3">Buy groceries <span class="badge">normal</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item4">
        <label for="item4">Morning run <span class="badge">normal</span></label>
      </li>
    </ul>

    <p class="section-label">This week</p>
    <ul class="todo-list">
      <li class="todo-item">
        <input type="checkbox" id="item5">
        <label for="item5">Finish reading chapter 4 <span class="badge">normal</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item6">
        <label for="item6">Schedule dentist appointment
          <span class="badge urgent">urgent</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item7">
        <label for="item7">Clean the apartment <span class="badge">normal</span></label>
      </li>
      <li class="todo-item">
        <input type="checkbox" id="item8">
        <label for="item8">Pay electricity bill <span class="badge">normal</span></label>
      </li>
    </ul>
  </div>
  <script>
    function addTask() {}

    function editTask() {}

    function deleteTask() {}

    function getNormal(type) {
      document.getElementById("id_normal").value = type;
      document.getElementById("id_important").value = '';
      document.getElementById("id_urgent").value = '';
    }

    function getImportant(type) {
      document.getElementById("id_normal").value = '';
      document.getElementById("id_important").value = type;
      document.getElementById("id_urgent").value = '';
    }

    function getUrgent(type) {
      document.getElementById("id_normal").value = '';
      document.getElementById("id_important").value = type;
      document.getElementById("id_urgent").value = '';
    }

    function saveTask() {
      let type = "";

      let taskName = document.getElementsByName("taskName")[0].value;
      let taskDate = document.getElementsByName("taskDate")[0].value;

      let normalType = document.getElementsByName("typeNormal")[0].value;
      let importantType = document.getElementsByName("typeImportant")[0].value;
      let urgentType = document.getElementsByName("typeUrgent")[0].value;

      if (normalType != "") {
        type = normalType;
      } else if (importantType != "") {
        type = importantType
      } else if (urgentType != "") {
        type = urgentType
      }

      fetch("/addTask", {
          method: "PATCH",
          headers: {
            "Content-Type": 'application/json'
          },
          body: JSON.stringify({
            taskName: taskName,
            taskDate: taskDate,
            type: type
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            alert(data.error)
          } else {
            location.reload();
          }
        })
        .catch(err => console.error("Request failed:", err));
    }
  </script>
</body>

</html>
